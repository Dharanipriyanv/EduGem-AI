<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EduGem AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
    height:100vh;
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

/* ================= SIDEBAR ================= */


.sidebar{
    width:260px;
    background:#020617;
    padding:10px;
    overflow-y:auto;
    border-right:1px solid #1e293b;
}

.new-chat{
    background:#22c55e;
    padding:14px;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
    cursor:pointer;
    margin-bottom:10px;
}

.chat-item{
    background:#1e293b;
    padding:12px;
    border-radius:8px;
    margin-bottom:8px;
    cursor:pointer;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.chat-item:hover{
    background:#334155;
}

.active-chat{
    border:2px solid #22c55e;
}

.delete-btn{
    color:red;
    cursor:pointer;
}

/* ================= MAIN ================= */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* ================= CHAT AREA ================= */

.messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

#welcome{
    text-align:center;
    margin-top:120px;
    font-size:32px;
    color:#94a3b8;
}

/* ================= MESSAGES ================= */

.msg{
    max-width:70%;
    padding:14px;
    border-radius:12px;
    margin-bottom:15px;
    line-height:1.5;
    white-space:pre-wrap;
}

.user{
    background:#334155;
    margin-left:auto;
}

.bot{
    background:#1e293b;
}

/* ================= INPUT ================= */

.input-box{
    display:flex;
    padding:15px;
    border-top:1px solid #1e293b;
    background:#0f172a;
}

.input-box input{
    flex:1;
    padding:14px;
    border:none;
    outline:none;
    border-radius:10px;
    font-size:16px;
}

.input-box button{
    margin-left:10px;
    border:none;
    border-radius:10px;
    padding:14px 18px;
    cursor:pointer;
    font-weight:bold;
}

.send{
    background:#22c55e;
}

.voice{
    background:#f59e0b;
}
</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        
        <div style="
font-size:24px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
color:#22c55e;
">
🚀 EduGem AI
</div>

        <div class="new-chat" onclick="newChat()">
            + New Chat
        </div>

        <div id="chatList"></div>

    </div>

    <!-- MAIN -->
    <div class="main">

        <div id="messages" class="messages">

            <div id="welcome">
                👋 Welcome <br><br>
                Ask me anything 🚀
            </div>

        </div>

        <div class="input-box">

            <input
                id="input"
                placeholder="Type message..."
            >

            <button class="send" onclick="send()">
                Send
            </button>

            <button class="voice" onclick="toggleVoice()">
                🔊
            </button>

        </div>

    </div>

</div>

<script>

let currentChat =
    localStorage.getItem("currentChat");
let voiceEnabled = true;
let loading = false;

/* ================= VOICE ================= */

function speak(text){

    if(!voiceEnabled) return;

    speechSynthesis.cancel();

    let msg =
        new SpeechSynthesisUtterance(text);

    msg.lang = "en-IN";

    speechSynthesis.speak(msg);
}

function toggleVoice(){

    voiceEnabled = !voiceEnabled;

    alert(
        voiceEnabled
        ? "Voice ON"
        : "Voice OFF"
    );
}

/* ================= MESSAGE UI ================= */

function addMessage(text, role){

    const welcome =
        document.getElementById("welcome");

    if(welcome) welcome.remove();

    const div =
        document.createElement("div");

    div.className =
        "msg " + (role === "user"
        ? "user"
        : "bot");

    div.innerText = text;

    document
        .getElementById("messages")
        .appendChild(div);

    scrollBottom();

    return div;
}

function scrollBottom(){

    const box =
        document.getElementById("messages");

    box.scrollTop = box.scrollHeight;
}

/* ================= LOAD CHATS ================= */

async function loadChats(){

    const res =
        await fetch(
            "http://127.0.0.1:5000/chats"
        );

    const data = await res.json();

    const list =
        document.getElementById("chatList");

    list.innerHTML = "";

    Object.keys(data)
    .reverse()
    .forEach(id => {

        const chat = data[id];

        const item =
            document.createElement("div");

        item.className = "chat-item";

        if(id === currentChat){
            item.classList.add("active-chat");
        }

        item.onclick = () => {
            loadChat(id);
        };

        const title =
            document.createElement("span");

        title.innerText =
            chat.title || "New Chat";

        const del =
            document.createElement("span");

        del.className = "delete-btn";

        del.innerText = "🗑";

        del.onclick = async (e) => {

            e.stopPropagation();

            await deleteChat(id);
        };

        item.appendChild(title);
        item.appendChild(del);

        list.appendChild(item);
    });
}

/* ================= LOAD SINGLE CHAT ================= */

async function loadChat(id){

    currentChat = id;

    const res =
        await fetch(
            `http://127.0.0.1:5000/chat/${id}`
        );

    const data = await res.json();

    const box =
        document.getElementById("messages");

    box.innerHTML = "";

    if(!data.messages || data.messages.length === 0){

        box.innerHTML =
            `<div id="welcome">
                👋 Welcome <br><br>
                Ask me anything 🚀
            </div>`;

        return;
    }

    data.messages.forEach(m => {

        addMessage(
            m.content,
            m.role
        );
    });

    loadChats();
}

/* ================= DELETE ================= */

async function deleteChat(id){

    await fetch(
        `http://127.0.0.1:5000/delete_chat/${id}`,
        {
            method:"DELETE"
        }
    );

    if(currentChat === id){

        currentChat = null;

        document.getElementById("messages")
        .innerHTML =
        `<div id="welcome">
            👋 Welcome <br><br>
            Ask me anything 🚀
        </div>`;
    }

    loadChats();
}

/* ================= NEW CHAT ================= */

function newChat(){

    currentChat = null;

    document.getElementById("messages")
    .innerHTML =
    `<div id="welcome">
        👋 Welcome <br><br>
        Ask me anything 🚀
    </div>`;

    loadChats();
}

/* ================= SEND ================= */

async function send(){

    if(loading) return;

    const input =
        document.getElementById("input");

    const text =
        input.value.trim();

    if(!text) return;

    loading = true;

    input.disabled = true;

    // remove welcome
    const welcome =
        document.getElementById("welcome");

    if(welcome) welcome.remove();

    // add user message
    addMessage(text, "user");

    input.value = "";

    // thinking bubble
    const thinking =
        addMessage(
            "⏳ Thinking...",
            "assistant"
        );

    try{

        const res =
            await fetch(
                "http://127.0.0.1:5000/ask",
                {
                    method:"POST",

                    headers:{
                        "Content-Type":
                        "application/json"
                    },

                    body: JSON.stringify({
                        message:text,
                        chat_id: currentChat
                    })
                }
            );

        const data =
            await res.json();

        // update thinking bubble
        thinking.innerText =
            data.answer;

        // VERY IMPORTANT
        currentChat =
            data.chat_id;

        // save current chat
        localStorage.setItem(
            "currentChat",
            currentChat
        );

        // voice
        speak(data.answer);

        // ONLY reload sidebar IF NEW CHAT
        if(
            !document.querySelector(".active-chat")
        ){
            await loadChats();
        }

    }
    catch(err){

        thinking.innerText =
            "❌ Server error";

        console.log(err);
    }

    loading = false;

    input.disabled = false;

    input.focus();

    scrollBottom();
}

/* ================= ENTER ================= */

document
.getElementById("input")
.addEventListener("keypress", e => {

    if(e.key === "Enter"){
        send();
    }
});

/* ================= INIT ================= */

(async () => {

    await loadChats();

    if(currentChat){
        loadChat(currentChat);
    }

})();

</script>

</body>
</html>
