<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
    background:#0f172a;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box {
    background:#1e293b;
    padding:40px;
    border-radius:10px;
    text-align:center;
}

input {
    width:250px;
    padding:12px;
    margin:10px;
    border-radius:8px;
    border:none;
}

button {
    padding:12px 20px;
    margin:10px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    color:white;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>AI Login</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>

<script>
async function login(){
    let res = await fetch("http://127.0.0.1:5000/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({username:user.value,password:pass.value})
    });

    let data = await res.json();

    if(data.status==="success"){
        localStorage.setItem("user",user.value);
        window.location="index.html";
    } else alert("Login failed");
}

async function signup(){
    await fetch("http://127.0.0.1:5000/signup",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({username:user.value,password:pass.value})
    });

    alert("Signup done");
}
</script>

</body>
</html>
